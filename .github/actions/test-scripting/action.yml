name: Test Scripting
description: "runs all the tests for bash scripts"

# secrets:
#   DEFAULT_MAINNET_RPC_URL:
#     description: "default API URL for accessing blockchain service"
#     required: false
inputs:
  # os:
  #   description: "Operating system to test"
  #   required: true
  #   type: string
  foundry:
    description: "Foundry version to test"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check Environment
      shell: bash
      run: |
        echo "runner.os=${{ runner.os }}"
        python3 -c "import platform; info = f'{platform.system()} {platform.release()} {platform.version()} {platform.machine()}'; print('-' * len(info)); print(info); print('-' * len(info))"

    - name: Install Bash 5.2
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install -y bash
          echo "Bash updated to version:"
          bash --version
        elif [[ "${{ runner.os }}" == "macOS" ]]; then
          brew install bash
          echo "Bash updated to version:"
          bash --version
        else
          echo "Windows not supported for Bash upgrade, using default Bash"
          bash --version
        fi

    - name: Install ShellCheck
      shell: bash
      run: |
        if [[ "${{ runner.os }}" == "Linux" ]]; then
          sudo apt-get update
          sudo apt-get install -y shellcheck
        elif [[ "${{ runner.os }}" == "macOS" ]]; then
          brew install shellcheck
        else
          echo "Windows not fully supported for ShellCheck - skipping"
        fi
        if command -v shellcheck &>/dev/null; then
          shellcheck --version
        fi

    # we install foundry because some scripts check for it's existence
    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: ${{ inputs.FOUNDRY }}
    - shell: bash
      run: |
        forge --version

    - name: Install project dependencies
      shell: bash
      run: |
        yarn

    - name: Run run script debug info
      shell: bash
      run: |
        DEBUG=run,nothing ./run nothing
        DEBUG=run-python ./run nothing-python
      id: nothing

    - name: Run Bash Script Linting
      shell: bash
      run: |
        yarn lint:bash
      id: lint

    - name: Run Bash Tests
      shell: bash
      run: |
        yarn test:bash
      id: bats

    # no python tests yet
    # - name: Run Python unit tests
    #   shell: bash
    #   run: |
    #     if [ -f "pyproject.toml" ]; then
    #       poetry install
    #       poetry run pytest
    #     else
    #       python -m pytest
    #     fi
    #   id: pytest

    - name: Check for changed repo files
      shell: bash
      run: |
        yarn git-diffs
