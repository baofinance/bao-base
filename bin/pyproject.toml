[project]
name = "bao-base_bin"
version = "0.1.0"
description = "Bao Finance base utilities"
requires-python = ">=3.9,<3.14"

dependencies = [
  # Core data utilities
  "pandas~=2.2.3",
  "tabulate~=0.9.0",
  "toml~=0.10.2",
  "python-dotenv~=1.1.0",
  # Coloured terminal output (doctor.py pass/fail report)
  "rich~=13.7",
  # [tool.pytest.ini_options]
  # testpaths = ["tests"]
  # python_files = "test_*.py"
  # Testing frameworks
  "pytest~=7.4.0",
  "pytest-cov~=4.1.0",
  "pytest-xdist~=3.5.0",
  # Additional test dependencies
  "coverage~=7.3.2",
  # JSONC parsing (doctor reads .vscode/settings.json)
  "json5>=0.15.0",
]

